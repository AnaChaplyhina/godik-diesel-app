<!DOCTYPE html>
<html lang="da">

<title>Diesel Registrering – Godik</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&display=swap');

  :root {
    --dark-green: #082600;
    --green:      #008545;
    --red:        #E62B27;
    --beige:      #F4F4EF;
    --dark-beige: #E8EAE3;
    --white:      #FFFFFF;
    --text-body:  #636363;
    --text-dark:  #082600;

    --r: 10px;
    --shadow: 0 2px 12px rgba(8,38,0,0.10);
    --font: 'Raleway', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--beige); color: var(--text-dark); min-height: 100dvh; padding-bottom: 48px; }

  /* HEADER */
  .site-header { background: var(--dark-green); padding: 14px 20px; display: flex; align-items: center; gap: 14px; }
  .logo-wrap { display: flex; align-items: center; gap: 6px; }
  .logo-text { font-family: var(--font); font-weight: 800; font-size: 22px; color: var(--green); letter-spacing: 1px; line-height: 1; }
  .logo-heart { color: var(--red); font-size: 18px; line-height: 1; }
  .header-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.15); margin: 0 4px; }
  .header-sub { color: rgba(255,255,255,0.55); font-size: 12px; font-weight: 400; }
  .header-title { color: var(--white); font-size: 14px; font-weight: 700; line-height: 1.2; }

  /* TABS */
  .tabs { display: flex; background: var(--dark-green); padding: 0 16px; border-top: 1px solid rgba(255,255,255,0.08); }
  .tab { flex: 1; padding: 11px 4px; text-align: center; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.45); cursor: pointer; border-bottom: 3px solid transparent; transition: color .15s, border-color .15s; user-select: none; letter-spacing: .4px; text-transform: uppercase; }
  .tab.active { color: var(--white); border-bottom-color: var(--green); }

  /* VIEWS */
  .view { display: none; padding: 16px; }
  .view.active { display: block; }

  /* CARD */
  .card { background: var(--white); border-radius: var(--r); box-shadow: var(--shadow); padding: 20px; margin-bottom: 14px; border-top: 3px solid var(--green); }
  .card-title { font-size: 10px; font-weight: 800; color: var(--green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

  /* FIELDS */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: 12px; font-weight: 700; color: var(--dark-green); margin-bottom: 5px; letter-spacing: .2px; }
  label .req { color: var(--red); }
  label .hint { font-weight: 400; color: var(--text-body); font-size: 11px; margin-left: 4px; }
  input[type="text"], input[type="number"], input[type="date"], select {
    width: 100%; padding: 12px 13px; border: 1.5px solid var(--dark-beige); border-radius: 8px;
    font-size: 16px; font-family: var(--font); color: var(--text-dark); background: var(--beige);
    transition: border-color .15s, background .15s; -webkit-appearance: none; appearance: none;
    font-weight: 600;
  }
  input:focus, select:focus { outline: none; border-color: var(--green); background: var(--white); }
  input.err { border-color: var(--red); background: #FFF0F0; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-err { font-size: 11px; color: var(--red); margin-top: 4px; display: none; font-weight: 600; }
  .field-err.show { display: block; }

  /* BUTTONS */
  .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 14px; font-weight: 800; cursor: pointer; transition: opacity .15s, transform .1s; margin-top: 6px; letter-spacing: .5px; text-transform: uppercase; font-family: var(--font); }
  .btn:active { opacity: .85; transform: scale(.98); }
  .btn-primary { background: var(--dark-green); color: var(--white); box-shadow: 0 3px 10px rgba(8,38,0,.3); }
  .btn-anmod   { background: var(--dark-green); color: var(--white); }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--dark-green); color: var(--white); padding: 13px 22px; border-radius: 50px; font-size: 13px; font-weight: 700; box-shadow: 0 4px 20px rgba(0,0,0,.2); transition: transform .3s cubic-bezier(.34,1.56,.64,1); white-space: nowrap; z-index: 999; pointer-events: none; font-family: var(--font); letter-spacing: .3px; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.t-err { background: var(--red); }

  /* OVERSIGT */
  .section-label { font-size: 10px; font-weight: 800; color: var(--text-body); text-transform: uppercase; letter-spacing: .8px; margin: 16px 0 8px; display: flex; align-items: center; gap: 8px; }
  .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 10px; font-size: 10px; font-weight: 800; }
  .badge-wait { background: #E8F4FF; color: #1A5276; }
  .badge-done { background: #E6F5EE; color: var(--green); }

  .search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
  .search-bar input { flex: 1; padding: 10px 12px; font-size: 14px; }
  .btn-csv { padding: 10px 14px; background: var(--dark-green); color: var(--white); border: none; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; white-space: nowrap; font-family: var(--font); letter-spacing: .5px; text-transform: uppercase; }

  /* RECORD CARD */
  .rec { background: var(--white); border-radius: var(--r); box-shadow: var(--shadow); padding: 14px 16px; margin-bottom: 9px; border-left: 4px solid var(--dark-beige); }
  .rec.waiting { border-left-color: var(--dark-green); }
  .rec.done    { border-left-color: var(--green); }
  .rec-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .rec-booking { font-size: 14px; font-weight: 800; color: var(--dark-green); }
  .status-pill { font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px; letter-spacing: .3px; text-transform: uppercase; }
  .pill-wait { background: #E8F4FF; color: #1A5276; }
  .pill-done { background: #E6F5EE; color: var(--green); }
  .rec-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
  .tag { display: inline-flex; align-items: center; gap: 3px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; background: var(--beige); color: var(--dark-green); }
  .tag-fuel { background: #E6F5EE; color: var(--green); }
  .tag-dept { background: var(--dark-beige); color: var(--dark-green); }
  .rec-meta { font-size: 11px; color: var(--text-body); margin-top: 6px; font-weight: 600; }
  .rec-actions { margin-top: 10px; display: flex; gap: 7px; justify-content: flex-end; }
  .btn-sm { padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--dark-beige); background: none; color: var(--text-body); font-family: var(--font); text-transform: uppercase; letter-spacing: .3px; }
  .btn-sm-ok { background: #E6F5EE; color: var(--green); border-color: var(--green); }

  .empty { text-align: center; padding: 40px 16px; color: var(--text-body); font-size: 13px; font-weight: 600; }
  .empty .ico { font-size: 32px; margin-bottom: 10px; }

  .field-err { font-size: 11px; color: var(--red); margin-top: 4px; display: none; font-weight: 600; }
  .field-err.show { display: block; }

  /* hint text below anmod btn */
  .photo-tag { color: var(--green); font-weight: 700; cursor: pointer; text-decoration: underline; }
  .hint-text { font-size: 11px; color: var(--text-body); text-align: center; margin-top: -2px; font-weight: 600; }
  .photo-upload-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:12px; border:2px dashed var(--dark-beige); border-radius:8px; background:var(--beige); font-size:13px; font-weight:700; color:var(--dark-green); cursor:pointer; transition:border-color .15s; font-family:var(--font); }
  .photo-upload-btn:hover { border-color:var(--green); }
</style>

<div class="view active" id="view-form">
  <div class="card">

<div class="view" id="view-oversigt">

</div>

<div id="toast"></div>

<script>
const APP_URL   = 'https://bit.ly/godik-diesel-el6219';
const SB_URL    = 'https://wfggcslxcxguxhbodxdb.supabase.co';
const SB_KEY    = 'sb_publishable_cLRfLHzlTpKAuFq_BKf1sA_IxAysueU';
const SB_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmZ2djc2x4Y3hndXhoYm9keGRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMDI3MDgsImV4cCI6MjA5OTY3ODcwOH0.KZyz6-v0a_Zz0I-m6GtyavyE9ZRPI54ggFmSE5pp6L8';
const SB_HEADERS = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

function uid()     { return 'R' + Date.now().toString(36).toUpperCase(); }
function todayISO(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(d){ if(!d) return '–'; const [y,m,day]=d.split('-'); return `${day}.${m}.${y}`; }
function deptName(email){ return email.includes('east') ? 'Hedehusene' : email.includes('gmail') ? 'Test' : 'Brovst'; }

async function sbGet(filter='') {
  const res = await fetch(`${SB_URL}/rest/v1/registrations?order=created_at.desc${filter}`, { headers: SB_HEADERS });
  return await res.json();
}
async function sbInsert(row) {
  await fetch(`${SB_URL}/rest/v1/registrations`, {
    method: 'POST', headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
    body: JSON.stringify(row)
  });
}
async function sbUpdate(id, patch) {
  await fetch(`${SB_URL}/rest/v1/registrations?id=eq.${id}`, {
    method: 'PATCH', headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
    body: JSON.stringify(patch)
  });
}
async function sbDelete(id) {
  await fetch(`${SB_URL}/rest/v1/registrations?id=eq.${id}`, {
    method: 'DELETE', headers: SB_HEADERS
  });
}

// Toast
let _tt;
function toast(msg, isErr=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=(isErr?'t-err ':'')+'show';
  clearTimeout(_tt); _tt=setTimeout(()=>t.className='',3000);
}

// Tabs
function switchTab(name){
  ['form','anmod','oversigt'].forEach(n=>{
    document.getElementById('view-'+n).classList.toggle('active', n===name);
  });
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['form','anmod','oversigt'][i]===name);
  });
  if(name==='oversigt') renderOversigt();
}

// Set today
document.getElementById('f-date').value = todayISO();

// Check URL params (pre-filled from anmod link)
(function prefill(){
  const p = new URLSearchParams(window.location.search);
  if(p.get('unit'))    document.getElementById('f-unit').value    = p.get('unit');
  if(p.get('booking')) document.getElementById('f-booking').value = p.get('booking');
  if(p.get('unit') || p.get('booking')) switchTab('form');
})();

// Validate helper
function chk(id, errId, fn){
  const el=document.getElementById(id), er=document.getElementById(errId);
  const ok=fn(el.value); el.classList.toggle('err',!ok); er&&er.classList.toggle('show',!ok); return ok;
}

// ── PHOTO HELPERS ──
function onPhotoSelect(input) {
  const file = input.files[0];
  if (!file) return;
  const label = file.name.length > 25 ? file.name.substring(0,25)+'...' : file.name;
  document.getElementById('photo-label').textContent = '📷 ' + label;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('photo-preview').src = e.target.result;
    document.getElementById('photo-preview-wrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function clearPhoto() {
  document.getElementById('f-photo').value = '';
  document.getElementById('photo-label').textContent = '📷 Vedhæft foto';
  document.getElementById('photo-preview-wrap').style.display = 'none';
  document.getElementById('photo-preview').src = '';
}

async function uploadPhoto(file, recordId) {
  const ext = file.name.split('.').pop() || 'jpg';
  const path = `${recordId}.${ext}`;
  const res = await fetch(`${SB_URL}/storage/v1/object/Photos/${path}`, {
    method: 'POST',
    headers: {
      'apikey': SB_ANON,
      'Authorization': 'Bearer ' + SB_ANON,
      'Content-Type': file.type || 'image/jpeg',
      'x-upsert': 'true'
    },
    body: file
  });
  if (!res.ok) {
    const err = await res.text();
    console.error('Storage error:', res.status, err);
    throw new Error('Photo upload failed');
  }
  return `${SB_URL}/storage/v1/object/public/Photos/${path}`;
}

// ── SUBMIT FORM ──
async function submitForm(){
  const ok1=chk('f-unit',   'ferr-unit',    v=>v.trim().length>0);
  const ok3=chk('f-used',   'ferr-used',    v=>v!==''&&parseFloat(v)>=0);
  if(!ok1||!ok3){ toast('Udfyld de påkrævede felter', true); return; }

  const unit    = document.getElementById('f-unit').value.trim();
  const booking = document.getElementById('f-booking').value.trim();

  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = 'Gemmer...';

  try {
    // Find matching pending anmod
    let pending = null;
    if(booking) {
      const rows = await sbGet(`&type=eq.anmod&status=eq.waiting&unit=eq.${encodeURIComponent(unit)}&booking=eq.${encodeURIComponent(booking)}`);
      pending = rows && rows[0];
    }

    const photoFile = document.getElementById('f-photo').files[0];
    const recordId = uid();

    let photoUrl = null;
    if (photoFile) {
      try { photoUrl = await uploadPhoto(photoFile, recordId); }
      catch(e) { console.warn('Photo upload failed:', e); }
    }

    const record = {
      id:        recordId,
      type:      'record',
      status:    'done',
      unit,
      booking:   booking || null,
      date:      document.getElementById('f-date').value || todayISO(),
      used:      parseFloat(document.getElementById('f-used').value)||0,
      rest:      parseFloat(document.getElementById('f-rest').value)||0,
      note:      document.getElementById('f-note').value.trim() || null,
      linked_to: pending ? pending.id : null,
      photo_url: photoUrl,
    };

    await sbInsert(record);
    if(pending) await sbUpdate(pending.id, { status: 'done' });

    clearPhoto();
    ['f-unit','f-booking','f-used','f-rest','f-note'].forEach(id=>{
      const el=document.getElementById(id); el.value=''; el.classList.remove('err');
    });
    document.getElementById('f-date').value = todayISO();
    document.querySelectorAll('.field-err').forEach(e=>e.classList.remove('show'));
    if(window.location.search) history.replaceState({},'',window.location.pathname);

    toast('✓ Registrering gemt' + (pending?' – anmodning markeret som udfyldt':''));
  } catch(e) {
    console.error(e);
    toast('Fejl ved gemning – prøv igen', true);
  } finally {
    btn.disabled = false; btn.textContent = 'Gem registrering';
  }
}

// ── SEND ANMOD ──
async function sendAnmod(){
  const ok1=chk('a-unit',   'aerr-unit',    v=>v.trim().length>0);
  const ok2=chk('a-booking','aerr-booking', v=>v.trim().length>0);
  const ok3=chk('a-dept',   'aerr-dept',    v=>v.length>0);
  if(!ok1||!ok2||!ok3){ toast('Udfyld de påkrævede felter', true); return; }

  const unit    = document.getElementById('a-unit').value.trim();
  const booking = document.getElementById('a-booking').value.trim();
  const dept    = document.getElementById('a-dept').value;
  const note    = document.getElementById('a-note').value.trim();

  const req = {
    id:      uid(),
    type:    'anmod',
    status:  'waiting',
    unit, booking, dept,
    note:    note || null,
  };
  await sbInsert(req);

  const link = `${APP_URL}?unit=${encodeURIComponent(unit)}&booking=${encodeURIComponent(booking)}`;
  // Generate QR as base64 so it's not blocked by email clients
  const qrApiUrl = `https://chart.googleapis.com/chart?cht=qr&chs=300x300&chl=${encodeURIComponent(link)}&choe=UTF-8`;
  let qr_url = qrApiUrl;
  try {
    const resp = await fetch(qrApiUrl);
    const blob = await resp.blob();
    qr_url = await new Promise(res => {
      const reader = new FileReader();
      reader.onloadend = () => res(reader.result);
      reader.readAsDataURL(blob);
    });
  } catch(e) { console.warn('QR base64 failed, using URL fallback', e); }

  const btn = document.querySelector('.btn-anmod');
  btn.disabled = true;
  btn.textContent = 'Sender...';

  try {
    await emailjs.send('service_e3uxna4', 'template_ti9sr7o', {
      to_email: dept,
      unit,
      booking,
      note:    note || '–',
      link,
      qr_url,
    });
    ['a-unit','a-booking','a-note'].forEach(id=>{ document.getElementById(id).value=''; document.getElementById(id).classList.remove('err'); });
    document.getElementById('a-dept').value='';
    document.querySelectorAll('.field-err').forEach(e=>e.classList.remove('show'));
    toast('✓ Email sendt til ' + deptName(dept));
    switchTab('oversigt');
  } catch(err) {
    console.error(err);
    toast('Fejl ved afsendelse – prøv igen', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send anmodning';
  }
}

// ── RENDER OVERSIGT ──
async function renderOversigt(){
  document.getElementById('oversigt-content').innerHTML = '<div class="empty"><div class="ico">⏳</div>Henter data...</div>';
  let all;
  try { all = await sbGet(); } catch(e) { document.getElementById('oversigt-content').innerHTML = '<div class="empty"><div class="ico">⚠️</div>Kunne ikke hente data</div>'; return; }

  const q = (document.getElementById('search').value||'').toLowerCase();
  const filter = r => !q ||
    (r.booking&&r.booking.toLowerCase().includes(q)) ||
    r.unit.toLowerCase().includes(q) ||
    (r.note&&r.note.toLowerCase().includes(q));

  const waiting = all.filter(r=>r.type==='anmod' && r.status==='waiting' && filter(r));
  const done    = all.filter(r=>r.type==='record' && filter(r));

  let html = '';

  // Waiting section
  html += `<div class="section-label">Afventer oplysninger <span class="badge badge-wait">${waiting.length}</span></div>`;
  if(!waiting.length){
    html += `<div class="empty"><div class="ico">✅</div>Ingen ventende anmodninger</div>`;
  } else {
    html += waiting.map(r=>`
      <div class="rec waiting">
        <div class="rec-top">
          <div class="rec-booking">Booking: ${r.booking}</div>
          <span class="status-pill pill-wait">Afventer</span>
        </div>
        <div class="rec-tags">
          <span class="tag">⚙️ ${r.unit}</span>
          <span class="tag tag-dept">🏢 ${deptName(r.dept)}</span>
          ${r.note?`<span class="tag">💬 ${r.note}</span>`:''}
        </div>
        <div class="rec-meta">Oprettet ${fmtDate((r.created_at||'').split('T')[0])}</div>
        <div class="rec-actions">
          <button class="btn-sm" onclick="deleteRec('${r.id}')">Slet</button>
          <button class="btn-sm btn-sm-ok" onclick="markDone('${r.id}')">Markér udfyldt</button>
        </div>
      </div>`).join('');
  }

  // Done section
  html += `<div class="section-label" style="margin-top:20px;">Udfyldt <span class="badge badge-done">${done.length}</span></div>`;
  if(!done.length){
    html += `<div class="empty"><div class="ico">📋</div>Ingen registreringer endnu</div>`;
  } else {
    html += done.map(r=>`
      <div class="rec done">
        <div class="rec-top">
          <div class="rec-booking">Booking: ${r.booking}</div>
          <span class="status-pill pill-done">Udfyldt</span>
        </div>
        <div class="rec-tags">
          <span class="tag">⚙️ ${r.unit}</span>
          <span class="tag tag-fuel">⛽ ${r.used} L forbrug</span>
          ${r.rest>0?`<span class="tag">🪣 ${r.rest} L rest</span>`:''}
          ${r.note?`<span class="tag">💬 ${r.note}</span>`:''}
        </div>
        <div class="rec-meta">${fmtDate(r.date)}${r.linked_to?' · Udfyldt fra anmodning':''}${r.photo_url?` · <span class="photo-tag" onclick="openPhoto('${r.photo_url}')">📷 Se foto</span>`:''}</div>
        <div class="rec-actions">
          <button class="btn-sm" onclick="deleteRec('${r.id}')">Slet</button>
        </div>
      </div>`).join('');
  }

  document.getElementById('oversigt-content').innerHTML = html;
}

// ── MARK DONE MANUALLY ──
async function markDone(id){
  await sbUpdate(id, { status: 'done' });
  renderOversigt();
  toast('Markeret som udfyldt');
}

// ── DELETE ──
async function deleteRec(id){
  await sbDelete(id);
  renderOversigt();
  toast('Slettet');
}

// ── PHOTO MODAL ──
function openPhoto(url) {
  const modal = document.getElementById('photo-modal');
  document.getElementById('modal-img').src = url;
  modal.style.display = 'flex';
}
function closePhoto() {
  document.getElementById('photo-modal').style.display = 'none';
  document.getElementById('modal-img').src = '';
}

// ── EXPORT CSV ──
async function exportCSV(){
  const all = await sbGet('&type=eq.record');
  const records = all || [];
  if(!records.length){ toast('Ingen data at eksportere', true); return; }
  const hdr = ['ID','Dato','Generator/Tank','Booking','Brugt (L)','Rest (L)','Bemærkning','Tidsstempel'];
  const rows = records.map(r=>[r.id,fmtDate(r.date),r.unit,r.booking,r.used,r.rest,r.note||'',r.ts]);
  const csv = [hdr,...rows].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `godik_diesel_${todayISO()}.csv`; a.click();
  toast('CSV downloadet');
}
</script>
